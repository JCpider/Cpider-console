{% extends "base.html" %}

{% block title %}设置 - Spider Console{% endblock %}

{% block content %}
<section class="page-header">
    <h2>设置</h2>
    <p class="subtitle">管理 Spider Console 的基础运行配置，保存后会写入数据库。</p>
</section>

<section class="card settings-card">
    <div class="card-header">
        <h3>基础配置</h3>
        <span class="hint">settings</span>
    </div>
    <div class="card-body">
        <form id="settings-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="app_name">应用名称</label>
                    <input id="app_name" name="app_name" type="text" required>
                </div>
                <div class="form-group">
                    <label for="webui_host">主机</label>
                    <input id="webui_host" name="webui_host" type="text" required>
                </div>
                <div class="form-group">
                    <label for="webui_port">端口</label>
                    <input id="webui_port" name="webui_port" type="number" required>
                </div>
                <div class="form-group">
                    <label for="log_level">日志级别</label>
                    <select id="log_level" name="log_level">
                        <option value="DEBUG">DEBUG</option>
                        <option value="INFO">INFO</option>
                        <option value="WARNING">WARNING</option>
                        <option value="ERROR">ERROR</option>
                    </select>
                </div>
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label" for="debug">
                    <input id="debug" name="debug" type="checkbox">
                    <span>开启调试模式</span>
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">保存设置</button>
                <span id="settings-result" class="form-result"></span>
            </div>
        </form>
    </div>
</section>
{% endblock %}
